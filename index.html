
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { direction: rtl; }

.app {
  background: #0a0e1a;
  min-height: 100vh;
  font-family: var(--font-sans);
  color: #fff;
  padding: 0 0 2rem;
}

.header {
  background: #111827;
  border-bottom: 2px solid #00d4aa;
  padding: 1rem 1.25rem 0.75rem;
  display: flex;
  align-items: center;
  gap: 10px;
}
.header-icon {
  width: 36px; height: 36px;
  background: #00d4aa;
  border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.header-title { font-size: 18px; font-weight: 500; color: #fff; }
.header-sub { font-size: 12px; color: #00d4aa; margin-top: 1px; }

.section { padding: 1.25rem 1.25rem 0; }
.sec-label {
  font-size: 11px;
  color: #00d4aa;
  font-weight: 500;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.add-row { display: flex; gap: 8px; }
.add-row input {
  flex: 1;
  background: #1c2333;
  border: 1px solid #2d3748;
  border-radius: 8px;
  color: #fff;
  font-size: 15px;
  padding: 0 12px;
  height: 44px;
  outline: none;
  font-family: var(--font-sans);
  direction: rtl;
}
.add-row input::placeholder { color: #4a5568; }
.add-row input:focus { border-color: #00d4aa; }

.btn-add {
  width: 44px; height: 44px;
  background: #00d4aa;
  border: none;
  border-radius: 8px;
  color: #0a0e1a;
  font-size: 22px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.btn-add:active { opacity: 0.8; }

.plist { display: flex; flex-direction: column; gap: 6px; margin-top: 1.25rem; }

.pitem {
  display: flex;
  align-items: center;
  gap: 10px;
  background: #1c2333;
  border-radius: 10px;
  padding: 10px 12px;
  border: 1px solid #2d3748;
  transition: border-color 0.15s;
}
.pitem.active { border-color: #00d4aa22; }

.pitem-check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid #2d3748;
  background: transparent;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.pitem-check.on { background: #00d4aa; border-color: #00d4aa; }
.pitem-check.on::after { content: ''; width: 6px; height: 6px; background: #0a0e1a; border-radius: 50%; display: block; }

.pitem-name { flex: 1; font-size: 15px; color: #e2e8f0; }
.pitem.active .pitem-name { color: #fff; }

.pitem-del {
  background: none; border: none; cursor: pointer;
  color: #4a5568; font-size: 18px; line-height: 1;
  padding: 2px 4px;
}
.pitem-del:hover { color: #E24B4A; }

.counter-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0.75rem 1.25rem 0;
}
.counter-txt { font-size: 13px; color: #4a5568; }
.counter-num { font-size: 13px; color: #00d4aa; font-weight: 500; }

.draw-section { padding: 1rem 1.25rem 0; }

.btn-draw {
  width: 100%;
  height: 52px;
  background: #00d4aa;
  border: none;
  border-radius: 12px;
  color: #0a0e1a;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  gap: 8px;
  font-family: var(--font-sans);
  transition: opacity 0.15s;
}
.btn-draw:disabled { opacity: 0.3; cursor: not-allowed; }
.btn-draw:not(:disabled):active { opacity: 0.85; }

.results-section { padding: 1rem 1.25rem 0; display: flex; flex-direction: column; gap: 8px; }

.rcard {
  border-radius: 10px;
  padding: 12px 14px;
  border: 1px solid;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.rcard.play { background: #0d2e28; border-color: #00d4aa44; }
.rcard.wait { background: #2a1f0a; border-color: #EF9F2744; }

.rcard-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
.rcard.play .rcard-label { color: #00d4aa; }
.rcard.wait .rcard-label { color: #EF9F27; }

.rcard-names { font-size: 16px; font-weight: 500; color: #fff; }

.btn-reset {
  width: calc(100% - 2.5rem);
  margin: 0.75rem 1.25rem 0;
  height: 40px;
  background: transparent;
  border: 1px solid #2d3748;
  border-radius: 10px;
  color: #4a5568;
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font-sans);
}
.btn-reset:hover { border-color: #4a5568; color: #718096; }

.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); }
</style>

<div class="app" dir="rtl">
  <h2 class="sr-only">הגרלת זוגות פיפא 26</h2>

  <div class="header">
    <div class="header-icon">
      <i class="ti ti-ball-football" aria-hidden="true" style="font-size:20px;color:#0a0e1a;"></i>
    </div>
    <div>
      <div class="header-title">הגרלת זוגות</div>
      <div class="header-sub">פיפא 26 · פלייסטיישן</div>
    </div>
  </div>

  <div class="section">
    <p class="sec-label">הוסף שחקן</p>
    <div class="add-row">
      <input type="text" id="nameInput" placeholder="שם החבר..." />
      <button class="btn-add" id="addBtn" aria-label="הוסף שחקן">
        <i class="ti ti-plus" aria-hidden="true"></i>
      </button>
    </div>
  </div>

  <div id="plistWrap" style="padding: 0 1.25rem; margin-top: 1.25rem;">
    <p class="sec-label">מי נוכח היום?</p>
    <div class="plist" id="plist"></div>
  </div>

  <div class="counter-bar">
    <span class="counter-txt">שחקנים נוכחים</span>
    <span class="counter-num" id="counter">0</span>
  </div>

  <div class="draw-section">
    <button class="btn-draw" id="drawBtn" disabled>
      <i class="ti ti-refresh" aria-hidden="true" style="font-size:18px;"></i>
      הגרל שחקן
    </button>
  </div>

  <div class="results-section" id="results"></div>
  <button class="btn-reset" id="resetBtn" style="display:none">התחל הגרלה מחדש</button>
</div>

<script>
(function() {
  var players = [];
  var queue = [];
  var drawn = [];

  function getActive() {
    return players.filter(function(p) { return p.active; });
  }

  function render() {
    var list = document.getElementById('plist');
    list.innerHTML = '';
    players.forEach(function(p, i) {
      var div = document.createElement('div');
      div.className = 'pitem' + (p.active ? ' active' : '');

      var chk = document.createElement('div');
      chk.className = 'pitem-check' + (p.active ? ' on' : '');
      chk.onclick = function() { players[i].active = !players[i].active; render(); };

      var name = document.createElement('span');
      name.className = 'pitem-name';
      name.textContent = p.name;

      var del = document.createElement('button');
      del.className = 'pitem-del';
      del.innerHTML = '&times;';
      del.setAttribute('aria-label', 'הסר ' + p.name);
      del.onclick = function() { players.splice(i, 1); render(); };

      div.appendChild(chk);
      div.appendChild(name);
      div.appendChild(del);
      list.appendChild(div);
    });

    var activeCount = getActive().length;
    document.getElementById('counter').textContent = activeCount;
    var drawBtn = document.getElementById('drawBtn');
    if (queue.length === 0) {
      drawBtn.disabled = activeCount < 2;
    } else {
      drawBtn.disabled = drawn.length >= queue.length;
    }
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = a[i]; a[i] = a[j]; a[j] = t;
    }
    return a;
  }

  document.getElementById('addBtn').onclick = function() {
    var input = document.getElementById('nameInput');
    var name = input.value.trim();
    if (!name) return;
    players.push({ name: name, active: true });
    input.value = '';
    input.focus();
    render();
  };

  document.getElementById('nameInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') document.getElementById('addBtn').click();
  });

  document.getElementById('drawBtn').onclick = function() {
    if (queue.length === 0) {
      queue = shuffle(getActive().map(function(p) { return p.name; }));
      drawn = [];
      document.getElementById('results').innerHTML = '';
      document.getElementById('resetBtn').style.display = 'none';
    }

    if (drawn.length >= queue.length) return;

    var name = queue[drawn.length];
    drawn.push(name);

    if (drawn.length % 2 === 0) {
      var p1 = drawn[drawn.length - 2];
      var p2 = drawn[drawn.length - 1];
      var pairNum = drawn.length / 2;
      var isPlay = pairNum <= 2;
      var card = document.createElement('div');
      card.className = 'rcard ' + (isPlay ? 'play' : 'wait');
      card.innerHTML =
        '<div class="rcard-label">' + (isPlay ? 'משחקים עכשיו' : 'ממתינים') + '</div>' +
        '<div class="rcard-names">' + p1 + ' ↔ ' + p2 + '</div>';
      document.getElementById('results').appendChild(card);
    }

    if (drawn.length >= queue.length) {
      if (drawn.length % 2 !== 0) {
        var solo = document.createElement('div');
        solo.className = 'rcard wait';
        solo.innerHTML = '<div class="rcard-label">ממתין</div><div class="rcard-names">' + drawn[drawn.length - 1] + '</div>';
        document.getElementById('results').appendChild(solo);
      }
      document.getElementById('resetBtn').style.display = 'block';
    }

    render();
  };

  document.getElementById('resetBtn').onclick = function() {
    queue = [];
    drawn = [];
    document.getElementById('results').innerHTML = '';
    document.getElementById('resetBtn').style.display = 'none';
    render();
  };

  render();
})();
</script>
